<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TABAAHI — Wrecking Ball Chaos</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0e0a1e;color:#fff;
    font-family:"Courier New",monospace;-webkit-user-select:none;user-select:none;touch-action:none}
  canvas{display:block;cursor:grab}
  canvas:active{cursor:grabbing}
  .ui{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;background:rgba(14,10,30,.82);
    backdrop-filter:blur(4px);padding:24px;z-index:6}
  .ui.hidden{display:none}
  h1{font-size:clamp(36px,10vw,74px);letter-spacing:.15em;font-weight:900;
    background:linear-gradient(180deg,#ff5d73,#ffb03a);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 30px rgba(255,93,115,.5));transform:rotate(-2deg)}
  .sub{margin:18px 0 26px;color:#a89ecf;font-size:14px;letter-spacing:.1em;line-height:2.1;max-width:540px}
  .sub em{color:#ffb03a;font-style:normal;font-weight:bold}
  button{background:linear-gradient(180deg,#ff5d73,#d13a52);border:none;color:#fff;
    font:inherit;font-weight:900;font-size:17px;letter-spacing:.25em;
    padding:16px 52px;cursor:pointer;border-radius:6px;
    box-shadow:0 6px 0 #8a2338,0 0 40px rgba(255,93,115,.4);transition:.1s}
  button:active{transform:translateY(5px);box-shadow:0 1px 0 #8a2338}
  .big{font-size:clamp(44px,12vw,84px);color:#ffb03a;margin:8px 0;font-weight:900;
    filter:drop-shadow(0 0 24px rgba(255,176,58,.6))}
  .label{font-size:12px;letter-spacing:.35em;color:#a89ecf}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
    align-items:flex-start;padding:14px 18px;pointer-events:none;z-index:2;
    text-shadow:0 2px 8px rgba(0,0,0,.8)}
  #hud .score{font-size:26px;font-weight:900;color:#ffb03a}
  #hud .timer{font-size:26px;font-weight:900}
  #hud .timer.low{color:#ff5d73;animation:blink .5s infinite}
  @keyframes blink{50%{opacity:.4}}
  #combo{position:fixed;top:52px;left:18px;font-size:15px;font-weight:900;
    color:#ff5d73;letter-spacing:.2em;opacity:0;z-index:2;pointer-events:none;
    text-shadow:0 2px 8px rgba(0,0,0,.8);transition:opacity .25s,transform .25s}
  #megaText{position:fixed;top:35%;left:0;right:0;text-align:center;
    font-size:clamp(30px,9vw,64px);font-weight:900;color:#ffb03a;z-index:3;
    pointer-events:none;opacity:0;letter-spacing:.1em;transform:scale(.6) rotate(-4deg);
    filter:drop-shadow(0 0 30px rgba(255,176,58,.8));transition:.25s}
  #megaText.pop{opacity:1;transform:scale(1) rotate(-4deg)}
</style>
</head>
<body>
<div id="hud" style="display:none">
  <div class="score">💥 <span id="score">0</span></div>
  <div class="timer" id="timer">60</div>
</div>
<div id="combo">COMBO ×1</div>
<div id="megaText"></div>

<div class="ui" id="menu">
  <h1>TABAAHI</h1>
  <p class="sub">
    Ek crane. Ek wrecking ball. Ek poora sheher.<br>
    Aur <em>60 seconds</em>.<br><br>
    <em>Drag</em> the ball back &amp; <em>release</em> — physics baaki sab sambhal legi.<br>
    Chain destruction fast for <em>combos</em>. Towers girao, glass todo, tabaahi machao.
  </p>
  <button id="startBtn">MACHAO 💥</button>
</div>

<div class="ui hidden" id="over">
  <p class="label">TOTAL TABAAHI</p>
  <p class="big" id="finalScore">0</p>
  <p class="sub" id="verdict"></p>
  <button id="againBtn">EK AUR BAAR</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(()=>{
// ============ RENDERER / SCENE ============
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x1a1236,60,160);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,300);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

scene.add(new THREE.HemisphereLight(0x9a8aff,0x2a1a3a,0.85));
const sun=new THREE.DirectionalLight(0xffd0a0,1.1);
sun.position.set(25,40,20);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-45;sun.shadow.camera.right=45;
sun.shadow.camera.top=50;sun.shadow.camera.bottom=-10;
scene.add(sun);

// night-city sky
{
  const g=new THREE.SphereGeometry(200,16,10);
  const cols=[],pos=g.attributes.position;
  const top=new THREE.Color(0x0e0a1e),bot=new THREE.Color(0x5a2a6e);
  for(let i=0;i<pos.count;i++){const y=(pos.getY(i)+200)/400;
    const c=bot.clone().lerp(top,Math.pow(y,1.2));cols.push(c.r,c.g,c.b);}
  g.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
  scene.add(new THREE.Mesh(g,new THREE.MeshBasicMaterial({vertexColors:true,side:THREE.BackSide,fog:false})));
}
// ground
const ground=new THREE.Mesh(new THREE.BoxGeometry(160,1,160),
  new THREE.MeshLambertMaterial({color:0x3a3150}));
ground.position.y=-0.5;ground.receiveShadow=true;scene.add(ground);
// road strips
for(let i=-3;i<=3;i++){
  const r=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.05,120),
    new THREE.MeshLambertMaterial({color:0xffb03a}));
  r.position.set(i*14,0.03,0);scene.add(r);
}

// ============ MATERIALS ============
const PALETTE=[0xff5d73,0xffb03a,0x3ee0c8,0x8f6bff,0x4da3ff,0xff8adf];
const mats=PALETTE.map(c=>new THREE.MeshLambertMaterial({color:c}));
const glassM=new THREE.MeshLambertMaterial({color:0xbfe8ff,emissive:0x224466});
const darkM=new THREE.MeshLambertMaterial({color:0x2a2440});

// ============ PHYSICS BLOCKS ============
const blocks=[]; // {m,vx,vy,vz,rx,ry,rz,size,asleep,hit}
const boxGeo=new THREE.BoxGeometry(1,1,1);
function addBlock(x,y,z,sx,sy,sz,mat){
  const m=new THREE.Mesh(boxGeo,mat);
  m.scale.set(sx,sy,sz);m.position.set(x,y,z);
  m.castShadow=true;m.receiveShadow=true;
  scene.add(m);
  blocks.push({m,vx:0,vy:0,vz:0,wx:0,wy:0,wz:0,asleep:true,hit:false,
    r:Math.max(sx,sy,sz)*0.5,mass:sx*sy*sz});
  return m;
}
// build a tower of stacked blocks
function tower(bx,bz,floors,w){
  for(let f=0;f<floors;f++){
    const mat=f%3===1?glassM:mats[(Math.random()*mats.length)|0];
    // 4 wall segments per floor for satisfying collapse
    const y=f*2+1;
    addBlock(bx-w/2+0.5,y,bz,1,2,w,mat);
    addBlock(bx+w/2-0.5,y,bz,1,2,w,mat);
    addBlock(bx,y,bz-w/2+0.5,w-2,2,1,mat);
    addBlock(bx,y,bz+w/2-0.5,w-2,2,1,mat);
  }
  // roof
  addBlock(bx,floors*2+0.3,bz,w+0.6,0.6,w+0.6,darkM);
}
function buildCity(){
  // clear
  for(const b of blocks)scene.remove(b.m);
  blocks.length=0;
  const spots=[[-14,-8],[0,-12],[14,-8],[-8,4],[8,4],[0,14],[-18,8],[18,8],[-6,-22],[6,-22]];
  for(const [x,z] of spots){
    tower(x,z,3+((Math.random()*4)|0),4+((Math.random()*2)|0)*2);
  }
}

// ============ WRECKING BALL (pendulum) ============
const craneTop=new THREE.Vector3(0,34,10);
// crane visuals
{
  const armM=new THREE.MeshLambertMaterial({color:0xffb03a});
  const mast=new THREE.Mesh(new THREE.BoxGeometry(1.4,36,1.4),armM);
  mast.position.set(-20,17,10);scene.add(mast);
  const arm=new THREE.Mesh(new THREE.BoxGeometry(42,1.2,1.2),armM);
  arm.position.set(0,34,10);scene.add(arm);
  for(let i=0;i<5;i++){
    const brace=new THREE.Mesh(new THREE.BoxGeometry(0.5,3,0.5),armM);
    brace.position.set(-16+i*8,32.4,10);brace.rotation.z=0.7;scene.add(brace);
  }
}
const ROPE_L=26;
let ball={pos:new THREE.Vector3(0,craneTop.y-ROPE_L,10),vel:new THREE.Vector3(),r:2.6};
const ballMesh=new THREE.Mesh(new THREE.SphereGeometry(ball.r,20,16),
  new THREE.MeshLambertMaterial({color:0x444455}));
ballMesh.castShadow=true;scene.add(ballMesh);
// spikes on ball for menace
for(let i=0;i<10;i++){
  const s=new THREE.Mesh(new THREE.ConeGeometry(0.4,1,6),
    new THREE.MeshLambertMaterial({color:0x666677}));
  const a=i/10*6.28,b=Math.random()*3;
  s.position.set(Math.cos(a)*Math.sin(b)*ball.r,Math.cos(b)*ball.r,Math.sin(a)*Math.sin(b)*ball.r);
  s.lookAt(s.position.clone().multiplyScalar(2));
  ballMesh.add(s);
}
const ropeGeo=new THREE.BufferGeometry().setFromPoints([craneTop,ball.pos]);
const rope=new THREE.Line(ropeGeo,new THREE.LineBasicMaterial({color:0xccccdd}));
scene.add(rope);

// ============ INPUT: drag the ball ============
let dragging=false,dragPoint=new THREE.Vector3();
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
const dragPlane=new THREE.Plane();
function setMouse(e){
  const p=e.touches?e.touches[0]:e;
  mouse.x=(p.clientX/innerWidth)*2-1;
  mouse.y=-(p.clientY/innerHeight)*2+1;
}
function startDrag(e){
  if(!running)return;
  setMouse(e);
  ray.setFromCamera(mouse,camera);
  // generous grab: if ray passes near ball
  const toBall=ball.pos.clone().sub(ray.ray.origin);
  const along=toBall.dot(ray.ray.direction);
  const closest=ray.ray.origin.clone().add(ray.ray.direction.clone().multiplyScalar(along));
  if(closest.distanceTo(ball.pos)<8){
    dragging=true;
    dragPlane.setFromNormalAndCoplanarPoint(
      camera.getWorldDirection(new THREE.Vector3()).negate(),ball.pos);
  }
}
function moveDrag(e){
  if(!dragging)return;
  setMouse(e);
  ray.setFromCamera(mouse,camera);
  ray.ray.intersectPlane(dragPlane,dragPoint);
  if(dragPoint){
    // constrain to rope length sphere
    const d=dragPoint.clone().sub(craneTop);
    if(d.length()>ROPE_L)d.setLength(ROPE_L);
    const target=craneTop.clone().add(d);
    ball.vel.copy(target.clone().sub(ball.pos).multiplyScalar(18));
    ball.pos.copy(target);
  }
}
function endDrag(){dragging=false;}
addEventListener('mousedown',startDrag);
addEventListener('mousemove',moveDrag);
addEventListener('mouseup',endDrag);
addEventListener('touchstart',startDrag,{passive:true});
addEventListener('touchmove',moveDrag,{passive:true});
addEventListener('touchend',endDrag);

// ============ GAME STATE ============
let running=false,score=0,timeLeft=60,combo=1,comboTimer=0,shake=0;
const scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer');
const comboEl=document.getElementById('combo'),megaEl=document.getElementById('megaText');
const MEGA=['DHAMAKA!','BAWAAL!','EK NUMBER!','FULL TABAAHI!','KYA BAAT!','OP!!'];
let megaTimeout,recentHits=0,recentTimer=0;

function addScore(n){
  score+=n*combo;scoreEl.textContent=score;
  combo=Math.min(combo+0.5,8);comboTimer=2;
  comboEl.textContent='COMBO ×'+combo.toFixed(1);
  comboEl.style.opacity=1;comboEl.style.transform='scale(1.15)';
  setTimeout(()=>comboEl.style.transform='scale(1)',120);
  recentHits+=n;recentTimer=1;
}
function megaPop(){
  megaEl.textContent=MEGA[(Math.random()*MEGA.length)|0];
  megaEl.classList.add('pop');
  clearTimeout(megaTimeout);
  megaTimeout=setTimeout(()=>megaEl.classList.remove('pop'),900);
}

// ============ PHYSICS STEP ============
const G=-30;
function step(dt){
  // --- ball pendulum ---
  if(!dragging){
    ball.vel.y+=G*dt;
    ball.pos.addScaledVector(ball.vel,dt);
    // rope constraint
    const d=ball.pos.clone().sub(craneTop);
    if(d.length()>ROPE_L){
      d.setLength(ROPE_L);
      ball.pos.copy(craneTop.clone().add(d));
      // remove radial velocity
      const n=d.normalize();
      const vr=ball.vel.dot(n);
      if(vr>0)ball.vel.addScaledVector(n,-vr);
    }
    // floor
    if(ball.pos.y<ball.r){ball.pos.y=ball.r;ball.vel.y=Math.abs(ball.vel.y)*0.4;}
    ball.vel.multiplyScalar(Math.pow(0.6,dt)); // air drag
  }
  ballMesh.position.copy(ball.pos);
  ballMesh.rotation.y+=ball.vel.length()*dt*0.1;
  rope.geometry.setFromPoints([craneTop,ball.pos]);

  const ballSpeed=ball.vel.length();

  // --- blocks ---
  for(const b of blocks){
    const p=b.m.position;
    // ball impact
    const dist=p.distanceTo(ball.pos);
    if(dist<ball.r+b.r+0.4&&ballSpeed>4){
      if(!b.hit){b.hit=true;addScore(1);shake=Math.min(shake+0.15,0.7);}
      b.asleep=false;
      const n=p.clone().sub(ball.pos).normalize();
      const power=ballSpeed*(0.9+Math.random()*0.6)/Math.max(b.mass*0.12,1);
      b.vx+=n.x*power+((Math.random()-.5)*4);
      b.vy+=Math.abs(n.y)*power*0.5+4+Math.random()*5;
      b.vz+=n.z*power+((Math.random()-.5)*4);
      b.wx=(Math.random()-.5)*8;b.wy=(Math.random()-.5)*8;b.wz=(Math.random()-.5)*8;
    }
    if(b.asleep)continue;
    // integrate
    b.vy+=G*dt;
    p.x+=b.vx*dt;p.y+=b.vy*dt;p.z+=b.vz*dt;
    b.m.rotation.x+=b.wx*dt;b.m.rotation.y+=b.wy*dt;b.m.rotation.z+=b.wz*dt;
    // ground bounce
    const half=b.m.scale.y*0.5;
    if(p.y<half){
      p.y=half;
      if(Math.abs(b.vy)>3){b.vy=-b.vy*0.3;
        b.vx*=0.7;b.vz*=0.7;}
      else{b.vy=0;b.vx*=Math.pow(0.02,dt);b.vz*=Math.pow(0.02,dt);
        b.wx*=0.9;b.wy*=0.9;b.wz*=0.9;
        if(Math.abs(b.vx)<0.3&&Math.abs(b.vz)<0.3)b.asleep=true;}
    }
  }

  // --- domino: awake blocks knock neighbors (cheap pass) ---
  for(const a of blocks){
    if(a.asleep||Math.hypot(a.vx,a.vy,a.vz)<5)continue;
    for(const b of blocks){
      if(b===a||!b.asleep)continue;
      if(a.m.position.distanceTo(b.m.position)<a.r+b.r+0.3){
        b.asleep=false;b.hit||(b.hit=true,addScore(1));
        b.vx=a.vx*0.5+(Math.random()-.5)*3;
        b.vy=Math.abs(a.vy)*0.3+3;
        b.vz=a.vz*0.5+(Math.random()-.5)*3;
        b.wx=(Math.random()-.5)*6;b.wz=(Math.random()-.5)*6;
        a.vx*=0.8;a.vz*=0.8;
      }
    }
  }

  // combo decay + mega text
  comboTimer-=dt;
  if(comboTimer<=0){combo=1;comboEl.style.opacity=0;}
  recentTimer-=dt;
  if(recentTimer<=0){
    if(recentHits>=10)megaPop();
    recentHits=0;recentTimer=1;
  }
  shake=Math.max(0,shake-dt*1.5);
}

// ============ CAMERA ============
let camAngle=0;
function updateCamera(dt){
  camAngle+=dt*0.05; // slow orbit for drama
  const cx=Math.sin(camAngle)*4;
  const target=new THREE.Vector3(cx,26,42);
  camera.position.lerp(target,Math.min(1,dt*2));
  const sx=(Math.random()-.5)*shake,sy=(Math.random()-.5)*shake;
  camera.position.x+=sx;camera.position.y+=sy;
  camera.lookAt(0,6,0);
}

// ============ LOOP ============
const clock=new THREE.Clock();
let acc=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.033);
  if(running){
    step(dt);
    timeLeft-=dt;
    const tl=Math.max(0,Math.ceil(timeLeft));
    timerEl.textContent=tl;
    timerEl.classList.toggle('low',tl<=10);
    if(timeLeft<=0)endGame();
  }
  updateCamera(dt);
  renderer.render(scene,camera);
}
animate();

// ============ FLOW ============
const menu=document.getElementById('menu'),over=document.getElementById('over');
const hud=document.getElementById('hud');
function start(){
  buildCity();
  score=0;timeLeft=60;combo=1;shake=0;
  scoreEl.textContent='0';timerEl.textContent='60';timerEl.classList.remove('low');
  ball.pos.set(0,craneTop.y-ROPE_L,10);ball.vel.set(0,0,0);
  menu.classList.add('hidden');over.classList.add('hidden');
  hud.style.display='flex';
  running=true;clock.getDelta();
}
function endGame(){
  running=false;hud.style.display='none';comboEl.style.opacity=0;
  document.getElementById('finalScore').textContent=score;
  const v=document.getElementById('verdict');
  v.textContent=score>=180?'Legendary tabaahi. Sheher waale abhi tak kaanp rahe hain. 🏆'
    :score>=100?'Solid demolition! Thodi aur practice aur tu unstoppable. 💪'
    :score>=40?'Theek-thaak todphod. Ball ko zor se ghumao next time!'
    :'Bas itna? Crane operator ki naukri khatre mein hai 😅';
  over.classList.remove('hidden');
}
document.getElementById('startBtn').addEventListener('click',start);
document.getElementById('againBtn').addEventListener('click',start);
})();
</script>
</body>
</html>
